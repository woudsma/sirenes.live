; PlatformIO Project Configuration
;
; Siren Detector — ESP32 Firmware
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor
monitor_speed = 115200

; huge_app partition (3 MB app) — the Edge Impulse model + SDK do not fit the
; default 1.25 MB app partition. LittleFS holds the web UI + event log.
board_build.partitions = huge_app.csv
board_build.filesystem = littlefs

; Library dependencies
lib_deps =
    ESP32Async/ESPAsyncWebServer@^3.0.0
    ESP32Async/AsyncTCP@^3.0.0
    fastled/FastLED@^3.6.0
    bblanchon/ArduinoJson@^7.0.0

; Auto-build the web UI before creating the filesystem image
extra_scripts = scripts/build_ui.py

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    ; Place the EON model's TFLite tensor arena (~14 KB) in static BSS instead of
    ; allocating it from the heap on every inference. The DSP's remaining
    ; allocations (MFCC/FFT scratch, ~20-30 KB per 250 ms slice) come from the
    ; dedicated EI heap — see ei_pool.cpp / EI_POOL_BYTES in config.h.
    -DEI_CLASSIFIER_ALLOCATION_STATIC=1
